name: Build Tatbigh for Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: دریافت سورس
        uses: actions/checkout@v4

      - name: نصب پایتون
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: نصب کتابخانه‌ها
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ساخت نسخه گرافیکی
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name Tatbigh main.py

      - name: بسته‌بندی خروجی
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item dist\Tatbigh.exe release\Tatbigh.exe
          Copy-Item README_FA.md release\README_FA.md
          Compress-Archive -Path release\* -DestinationPath Tatbigh_Windows.zip -Force

      - name: بارگذاری فایل نهایی
        uses: actions/upload-artifact@v4
        with:
          name: Tatbigh-Windows
          path: Tatbigh_Windows.zip
